<!doctype html>
<meta charset="utf-8" />
<meta http-equiv="Content-Security-Policy"
      content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline'; img-src data:; media-src data:;" />
<title>InferML - Output</title>
<style>
  :root {
    --bg: #0b0d12;
    --panel: #12151d;
    --border: #232838;
    --text: #e6e9f0;
    --muted: #8b93a7;
    --accent: #6d8cff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font: 14px/1.55 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }

  header {
    position: sticky; top: 0; z-index: 2;
    display: flex; align-items: baseline; gap: 10px;
    padding: 14px 18px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  header h1 { margin: 0; font-size: 14px; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 12px; }

  #stack { padding: 16px; display: flex; flex-direction: column; gap: 16px; }

  .empty {
    padding: 64px 24px; text-align: center; color: var(--muted);
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .card > .head {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
  }
  .model { font-size: 13px; font-weight: 600; }
  .task {
    font-size: 11px; color: var(--muted);
    border: 1px solid var(--border); border-radius: 999px; padding: 1px 8px;
  }
  .time { margin-left: auto; font-size: 11px; color: var(--muted); }
  .save {
    font-size: 11px; color: var(--accent); text-decoration: none;
    border: 1px solid var(--border); border-radius: 6px; padding: 2px 8px;
  }
  .save:hover { border-color: var(--accent); }

  .body { padding: 12px; display: flex; flex-direction: column; gap: 12px; }

  /* Media fits the window by default; click to inspect at natural size. */
  img.media {
    display: block; max-width: 100%; max-height: 60vh;
    width: auto; height: auto; object-fit: contain;
    border-radius: 8px; cursor: zoom-in;
  }
  img.media.zoom { max-width: none; max-height: none; cursor: zoom-out; }
  .scroller { overflow: auto; border-radius: 8px; }

  audio.media, video.media { display: block; width: 100%; border-radius: 8px; }
  video.media { max-height: 60vh; background: #000; }

  pre.text {
    margin: 0; padding: 10px 12px; white-space: pre-wrap; word-break: break-word;
    background: #0e111a; border: 1px solid var(--border); border-radius: 8px;
    font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
  }

  table.rows { width: 100%; border-collapse: collapse; font-size: 12px; }
  table.rows td { padding: 4px 6px; border-bottom: 1px solid var(--border); }
  table.rows tr:last-child td { border-bottom: 0; }
  td.label { font-weight: 600; }
  td.score { color: var(--muted); width: 64px; text-align: right; }
  td.box   { color: var(--muted); font: 11px ui-monospace, monospace; }

  .bar { height: 4px; border-radius: 999px; background: var(--border); }
  .bar > span { display: block; height: 100%; border-radius: 999px; background: var(--accent); }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--muted);
    border: 1px solid var(--border); border-radius: 999px; padding: 2px 8px;
  }
  .swatch { width: 10px; height: 10px; border-radius: 3px; flex: none; }
</style>

<header>
  <h1>Output</h1>
  <span class="sub">results from the local API and MCP</span>
</header>

<div id="stack">
  <div class="empty">Waiting for a result…</div>
</div>

<script src="viewer-page.js"></script>

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ─── Stage 1 ─────────────────────────────────────────────────────────────
  # Create an EMPTY draft release on the source repo first, so the build
  # matrix can race to upload into it without colliding on "create vs append".
  # Drafts are invisible to users, don't trigger electron-updater, and don't
  # get picked up by the website's `/releases/latest` link until we promote
  # them in the publish job. They're also stored in the (free, unlimited)
  # release-asset pool, NOT the per-account artifact-storage quota - which
  # is the whole reason this workflow exists in this shape.
  prepare:
    name: Prepare draft release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Create empty draft on source repo
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true

  # ─── Stage 2 ─────────────────────────────────────────────────────────────
  # Build per-OS installers in parallel. Each leg uploads its own files
  # directly into the draft release created above. softprops appends files
  # to an existing release for the same tag, so all three legs accumulate
  # without overwriting each other.
  build:
    name: Build (${{ matrix.label }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            script: dist:win
            artifacts: |
              dist/*.exe
              dist/*.exe.blockmap
              dist/latest.yml
          - os: macos-latest
            label: macos
            script: dist:mac
            artifacts: |
              dist/*.dmg
              dist/*.dmg.blockmap
              dist/*.zip
              dist/latest-mac.yml
          - os: ubuntu-latest
            label: linux
            script: dist:linux
            artifacts: |
              dist/*.AppImage
              dist/latest-linux.yml
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build installer (${{ matrix.label }})
        run: npm run ${{ matrix.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Append this OS's installers into the draft release. No upload-artifact
      # anywhere - the files go straight to release storage (unlimited, free)
      # and the workflow's per-account artifact quota stays untouched.
      - name: Append to draft release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: true
          files: ${{ matrix.artifacts }}
          fail_on_unmatched_files: false

  # ─── Stage 3 ─────────────────────────────────────────────────────────────
  # Atomic publish. Runs only after every matrix leg succeeded. Two steps:
  #   1. Flip the source draft → published in one shot. The website / updater
  #      see a fully-populated release at this exact moment.
  #   2. Download the now-published assets and mirror them to the public
  #      `localml-app` repo so users hit the public download URL. (The two
  #      repos can't share a release directly because they're separate
  #      Git repositories with separate Releases sections.)
  publish:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Promote draft → published (source repo)
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false  # ← the promotion. Same release, just visible now.

      - name: Download published assets from source repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p dist-all
          gh release download "${{ github.ref_name }}" \
            --repo "$GITHUB_REPOSITORY" \
            --dir dist-all
          ls -la dist-all/

      - name: Mirror release to public repo
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_REPO_TOKEN }}
          repository: IMvision12/localml-app
          files: dist-all/*
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          fail_on_unmatched_files: false

      # Prune older releases on both repos. Keeps the 5 most recent (sorted
      # by createdAt desc), drops the rest. Tags are left alone so source
      # links keep working. electron-updater only reads `latest.yml` from
      # the newest release, so pruning is safe for auto-update.
      - name: Prune old releases (source repo)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP: '5'
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json tagName,createdAt,isDraft \
            --jq "map(select(.isDraft == false)) | sort_by(.createdAt) | reverse | .[$KEEP:] | .[].tagName" \
            | while IFS= read -r tag; do
                [ -z "$tag" ] && continue
                echo "Deleting old release $tag in $GITHUB_REPOSITORY"
                gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes || true
              done

      - name: Prune old releases (public mirror)
        env:
          GH_TOKEN: ${{ secrets.RELEASE_REPO_TOKEN }}
          MIRROR_REPO: 'IMvision12/localml-app'
          KEEP: '5'
        run: |
          gh release list --repo "$MIRROR_REPO" --limit 100 --json tagName,createdAt,isDraft \
            --jq "map(select(.isDraft == false)) | sort_by(.createdAt) | reverse | .[$KEEP:] | .[].tagName" \
            | while IFS= read -r tag; do
                [ -z "$tag" ] && continue
                echo "Deleting old release $tag in $MIRROR_REPO"
                gh release delete "$tag" --repo "$MIRROR_REPO" --yes || true
              done

      # Sweep up any orphan drafts from previous runs that crashed mid-build.
      # Without this, a failed Windows build would leave a permanent draft
      # sitting around that the prune step (which excludes drafts) wouldn't
      # touch. Drafts older than 1 day on the same tag are safe to remove.
      - name: Clean up old drafts (source repo)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --repo "$GITHUB_REPOSITORY" --limit 50 --json tagName,createdAt,isDraft \
            --jq "map(select(.isDraft == true and (.createdAt | fromdateiso8601) < (now - 86400))) | .[].tagName" \
            | while IFS= read -r tag; do
                [ -z "$tag" ] && continue
                echo "Deleting orphan draft $tag in $GITHUB_REPOSITORY"
                gh release delete "$tag" --repo "$GITHUB_REPOSITORY" --yes --cleanup-tag || true
              done
